{% extends "base.html" %}

{% block title %}Checkout{% endblock %}

{% block content %}

<!-- Checkout page heading -->
<h2 class="page-heading">Checkout</h2>

<!-- Checkout form container -->
<div class="checkout-card">

    <!-- Customer delivery + contact details -->
    <form action="{{ url_for('complete_order') }}" method="POST" class="checkout-form">

        <label>First Name</label>
        <input type="text" name="first_name" value="{{ checkout_data.first_name or '' }}" required>

        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ checkout_data.last_name or '' }}" required>

        <label>Email Address</label>
        <input type="email" name="email" value="{{ checkout_data.email or '' }}" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" value="{{ checkout_data.phone or '' }}" required>

        <label>Address</label>
        <input type="text" name="address" value="{{ checkout_data.address or '' }}" required>

        <!-- Submit order -->
        <button type="submit" class="btn btn-primary checkout-submit">
            Complete Purchase
        </button>

    </form>

</div>

{% endblock %}
